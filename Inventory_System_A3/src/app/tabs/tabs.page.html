<!-- Ionic tab container component, manages tab switching and rendering -->
<ion-tabs>
  <!-- Tab bar component, slot="bottom" fixes it at the bottom of the screen -->
  <ion-tab-bar slot="bottom">
    <!-- Home tab button: linked to home route -->
    <ion-tab-button tab="home">
      <ion-icon [src]="icons.home"></ion-icon>
      <ion-label>Home</ion-label>
    </ion-tab-button>
    <!-- Inventory List tab button: linked to inventory route -->
    <ion-tab-button tab="inventory">
      <!-- Icon component: bound to list icon defined in ts -->
      <ion-icon [src]="icons.list"></ion-icon>
      <!-- Tab label text -->
      <ion-label>Inventory List</ion-label>
    </ion-tab-button>

    <!-- Add Item tab button: linked to add route -->
    <ion-tab-button tab="add">
      <ion-icon [src]="icons.add"></ion-icon>
      <ion-label>Add</ion-label>
    </ion-tab-button>

    <!-- Edit/Delete tab button: linked to edit-delete route -->
    <ion-tab-button tab="edit-delete">
      <ion-icon [src]="icons.edit"></ion-icon>
      <ion-label>Edit/Delete</ion-label>
    </ion-tab-button>

    <!-- Privacy & Security tab button: linked to privacy-security route -->
    <ion-tab-button tab="privacy-security">
      <ion-icon [src]="icons.privacy"></ion-icon>
      <ion-label>Privacy & Security</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
